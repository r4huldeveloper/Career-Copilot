<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background — makes it pop in any tab bar -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- Wing — white so it's visible on dark bg -->
  <path d="M 15 27
           C 13 22, 10 17, 9 12
           C 8 7, 10 3, 13.5 3
           C 15.5 3, 16.5 5.5, 17 8
           C 18.5 5, 21.5 3, 24 4
           C 26 5, 26.5 8.5, 24.5 12
           C 26.5 10, 29 10, 29.5 12.5
           C 30 15, 27.5 18, 24 19.5
           C 20 21.5, 17 24, 15 27 Z"
        fill="white" opacity="0.92"/>

  <!-- Wing feather line -->
  <path d="M 16 24 C 19.5 20, 24 18, 28 17" stroke="white" stroke-width="0.7" fill="none" stroke-opacity="0.35"/>

  <!-- Ladder — slightly off-white so it contrasts with wing -->
  <!-- Left rail -->
  <rect x="9.5" y="13.5" width="2.8" height="15" rx="1.4" fill="#BFDBFE"/>
  <!-- Right rail -->
  <rect x="16" y="13.5" width="2.8" height="15" rx="1.4" fill="#BFDBFE"/>
  <!-- Rungs -->
  <rect x="9.5" y="16" width="9.5" height="2.2" rx="1.1" fill="#BFDBFE"/>
  <rect x="9.5" y="20.5" width="9.5" height="2.2" rx="1.1" fill="#BFDBFE"/>
  <rect x="9.5" y="25" width="9.5" height="2.2" rx="1.1" fill="#BFDBFE"/>
</svg>
